services:
  postgres:
    container_name: gestock-database
    image: postgres:17
    environment:
      POSTGRES_DB: gestock
      POSTGRES_USER: gestock
      POSTGRES_PASSWORD: gestock
    volumes:
      - postgres:/var/lib/postgresql/data
    ports:
      - 5433:5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gestock"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres: