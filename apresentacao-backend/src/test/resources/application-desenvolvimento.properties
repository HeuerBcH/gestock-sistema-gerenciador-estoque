# ============================================
# Configuração do Banco de Dados PostgreSQL (Docker)
# ============================================
# Container Docker: docker compose up -d
spring.datasource.url=jdbc:postgresql://localhost:5433/gestock
spring.datasource.username=gestock
spring.datasource.password=gestock
spring.datasource.driverClassName=org.postgresql.Driver

# ============================================
# Configuração JPA/Hibernate
# ============================================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.physical_naming_strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# ============================================
# Configuração Flyway (Migrações)
# ============================================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.schemas=gestock

# ============================================
# Configuração do Servidor
# ============================================
server.port=8080